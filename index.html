<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Thumb Tracker</title>

<style>

body{
font-family:system-ui;
background:#0f172a;
color:white;
display:flex;
justify-content:center;
padding:30px;
}

.app{width:900px}

.header{
display:flex;
justify-content:space-between;
margin-bottom:20px;
}

.timeline{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(90px,1fr));
gap:12px;
padding:20px;
max-width:900px;
margin:auto;
}

.hour{
font-size:12px;
text-align:center;
opacity:.7;
}

.cell{
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
height:110px;

background:white;
border-radius:14px;

box-shadow:0 4px 10px rgba(0,0,0,.08);

cursor:pointer;
font-size:28px;
transition:.15s;
}

.cell:hover{
transform:translateY(-3px);
box-shadow:0 6px 16px rgba(0,0,0,.15);
}

.cell::before{
content:attr(data-hour);
font-size:13px;
opacity:.6;
margin-bottom:8px;
}

.good{background:#065f46}
.bad{background:#7f1d1d}

.score{margin-top:15px;opacity:.8}

button{
background:#334155;
border:none;
padding:6px 12px;
color:white;
border-radius:6px;
cursor:pointer;
}

@media (max-width:700px){

.timeline{
display:flex;
flex-direction:column;
gap:10px;
}

.hour{
display:none;
}

.cell{
height:60px;
font-size:20px;
border-radius:14px;
padding:0 16px;
display:flex;
justify-content:space-between;
align-items:center;
}

.cell::before{
content:attr(data-hour);
opacity:.7;
font-size:14px;
}

}

</style>
</head>

<body>

<div class="app">

<div class="header">
<h2>Thumb Tracker</h2>
<div>
<input type="date" id="date">
<button onclick="resetDay()">Reset</button>
</div>
</div>

<div id="timeline" class="timeline"></div>

<div id="score" class="score"></div>

</div>

<script>

const start=8,end=20
const timeline=document.getElementById("timeline")
const score=document.getElementById("score")
const date=document.getElementById("date")

date.value=new Date().toISOString().split("T")[0]

const key=()=> "grid-"+date.value

function load(){
return JSON.parse(localStorage.getItem(key())||"[]")
}

function save(){
const data=[]
document.querySelectorAll(".cell").forEach(c=>data.push(c.textContent))
localStorage.setItem(key(),JSON.stringify(data))
updateScore()
}

function style(cell){
cell.classList.remove("good","bad")
if(cell.textContent==="✔") cell.classList.add("good")
if(cell.textContent==="✖") cell.classList.add("bad")
}

function updateScore(){

let good=0,bad=0

document.querySelectorAll(".cell").forEach(c=>{
if(c.textContent==="✔") good++
if(c.textContent==="✖") bad++
})

let total=good+bad
let pct=total?Math.round((good/total)*100):0

score.textContent=`Productivity: ${pct}% (${good} good / ${bad} bad)`
}

function build(){

timeline.innerHTML=""
const saved=load()
let i=0

for(let h=start;h<=end;h++){

let label=(h>12?h-12:h)+":00 "+(h>=12?"PM":"AM")

let hour=document.createElement("div")
hour.className="hour"
hour.textContent=label

let cell=document.createElement("div")
cell.className="cell"
cell.dataset.hour = label


if(saved[i]){cell.textContent=saved[i];style(cell)}

cell.onclick=()=>{

if(cell.textContent==="") cell.textContent="✔"
else if(cell.textContent==="✔") cell.textContent="✖"
else cell.textContent=""

style(cell)
save()

}

timeline.appendChild(hour)
timeline.appendChild(cell)

i++

}

updateScore()

}

function resetDay(){
localStorage.removeItem(key())
build()
}

date.onchange=build

build()

</script>

</body>
</html>
